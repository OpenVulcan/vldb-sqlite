name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (must start with v)"
        required: true
        default: "v0.1.3"
        type: string
      amd64_runner:
        description: "Runner for linux/amd64"
        required: true
        default: "9950x"
        type: choice
        options:
          - "9950x"
          - "proart"
          - "ubuntu-24.04"
      arm64_runner:
        description: "Runner for linux/arm64"
        required: true
        default: "ubuntu-24.04-arm"
        type: choice
        options:
          - "ubuntu-24.04-arm"
          - "9950x"
          - "proart"
          - "ubuntu-24.04"
permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  IMAGE_NAME: vldb-sqlite

jobs:
  build-per-platform:
    name: Build ${{ matrix.platform }}
    runs-on: >-
      ${{
        (startsWith(matrix.runner, 'ubuntu') || startsWith(matrix.runner, 'macos') || startsWith(matrix.runner, 'windows'))
        && fromJSON(format('["{0}"]', matrix.runner))
        || fromJSON(format('["self-hosted", "{0}"]', matrix.runner))
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ${{ github.event_name == 'workflow_dispatch' && inputs.amd64_runner || '9950x' }}
          - platform: linux/arm64
            runner: ${{ github.event_name == 'workflow_dispatch' && inputs.arm64_runner || 'ubuntu-24.04-arm' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare platform metadata
        id: prep
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v.+ ]]; then
            echo "release_tag must start with v, got: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "platform_pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,push=true,push-by-digest=true,name-canonical=true
          provenance: false
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          cache-from: ${{ startsWith(matrix.runner, 'ubuntu') && format('type=gha,scope={0}-{1}', env.IMAGE_NAME, steps.prep.outputs.platform_pair) || '' }}
          cache-to: ${{ startsWith(matrix.runner, 'ubuntu') && format('type=gha,mode=max,scope={0}-{1}', env.IMAGE_NAME, steps.prep.outputs.platform_pair) || '' }}

      - name: Export digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.prep.outputs.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish multi-arch manifest
    needs: build-per-platform
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Prepare Docker tags
        id: tags
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          repo="${DOCKER_USERNAME}/${IMAGE_NAME}"
          if [[ ! "$RELEASE_TAG" =~ ^v.+ ]]; then
            echo "release_tag must start with v, got: $RELEASE_TAG" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          {
            echo "tags<<EOF"
            echo "${repo}:latest"
            echo "${repo}:${RELEASE_TAG}"
            echo "${repo}:${version}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push manifest list
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail

          repo="${DOCKER_USERNAME}/${IMAGE_NAME}"
          sources=()

          for digest_file in "$RUNNER_TEMP"/digests/*; do
            digest="$(basename "$digest_file")"
            sources+=("${repo}@sha256:${digest}")
          done

          if [[ "${#sources[@]}" -eq 0 ]]; then
            echo "No platform digests were downloaded." >&2
            exit 1
          fi

          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            docker buildx imagetools create -t "$tag" "${sources[@]}"
          done <<< "$TAGS"
